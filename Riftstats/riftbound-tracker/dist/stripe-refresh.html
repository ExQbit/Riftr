<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riftr — Link Expired</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px;
      text-align: center;
    }
    .icon {
      width: 72px; height: 72px;
      margin: 0 auto 20px;
      background: rgba(245, 158, 11, 0.12);
      border: 2px solid rgba(245, 158, 11, 0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    h1 {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 8px;
      color: #fff;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#128260;</div>
    <h1>Link Expired</h1>
    <p>This Stripe setup link has expired. Return to the Riftr app and tap "Set Up Payments" again to get a new link.</p>
  </div>
</body>
</html>
