<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riftr — Available on iOS & Android</title>
  <meta name="description" content="The Riftr Riftbound TCG companion app is available on iOS and Android. The web version is no longer available.">
  <meta name="theme-color" content="#020617">
  <meta property="og:title" content="Riftr — Riftbound TCG Companion">
  <meta property="og:description" content="Card scanner, Smart Cart deck buying, P2P marketplace, and collection tracker. Available on iOS & Android.">
  <meta property="og:type" content="website">
  <link rel="icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #020617;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }
    .card {
      background: #0F172A;
      border: 1px solid #1E293B;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(211, 164, 63, 0.2);
    }
    .icon img { width: 100%; height: 100%; display: block; }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #f8fafc;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 24px;
    }
    .cta {
      display: inline-block;
      padding: 14px 28px;
      background: #D3A43F;
      color: #1E3043;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      transition: transform 0.1s ease;
    }
    .cta:hover { transform: translateY(-1px); }
    .small {
      font-size: 13px;
      color: #64748B;
      margin-top: 20px;
    }
    .small a { color: #DDB855; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img src="icon-192.png" alt="Riftr"></div>
    <h1>Riftr is mobile-only</h1>
    <p>The Riftr Riftbound TCG companion is available on iOS and Android. The web version is no longer maintained.</p>
    <a class="cta" href="https://getriftr.app">Visit getriftr.app for download links</a>
    <div class="small">Looking for the app? Get it on the <a href="https://getriftr.app">App Store</a>.</div>
  </div>
</body>
</html>
